<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Time Zone Converter (EST & IST)</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --primary: #4a90e2;
            --accent: #f5a623;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #718096;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .time-box {
            background: #f8fafc;
            border-left: 5px solid var(--primary);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-box.ist {
            border-left-color: var(--accent);
        }

        .zone-label {
            font-weight: 600;
            font-size: 16px;
            color: #4a5568;
        }

        .zone-sub {
            font-size: 12px;
            color: #a0aec0;
            display: block;
            font-weight: normal;
        }

        .time-display {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .date-display {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            text-align: right;
            margin-top: 4px;
        }

        .day-offset {
            font-size: 11px;
            color: #718096;
            display: block;
            font-weight: normal;
        }

        .slider-container {
            margin: 35px 0 20px 0;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
            color: #a0aec0;
            font-size: 11px;
        }

        .btn-reset {
            display: block;
            margin: 20px auto 0 auto;
            background: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #e2e8f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>EST / IST Time Finder</h1>
    <p class="subtitle">Drag the scroll bar to view corresponding matching times and dates</p>

    <!-- EST Card -->
    <div class="time-box">
        <div>
            <span class="zone-label">EST</span>
            <span class="zone-sub" id="estOffset">Eastern Standard Time</span>
        </div>
        <div>
            <div class="time-display" id="estTime">- - : - -</div>
            <div class="date-display" id="estDate">- - - -</div>
        </div>
    </div>

    <!-- IST Card -->
    <div class="time-box ist">
        <div>
            <span class="zone-label">IST</span>
            <span class="zone-sub">India Standard Time (UTC+5:30)</span>
        </div>
        <div>
            <div class="time-display" id="istTime">- - : - -</div>
            <div class="date-display" id="istDate">- - - -</div>
        </div>
    </div>

    <!-- Interactive Scroll Bar -->
    <div class="slider-container">
        <input type="range" id="timeSlider" min="0" max="1439" value="720">
        <div class="ticks">
            <span>12 AM</span>
            <span>6 AM</span>
            <span>12 PM</span>
            <span>6 PM</span>
            <span>11 PM</span>
        </div>
    </div>

    <button class="btn-reset" id="resetBtn">Reset to Current Time</button>
</div>

<script>
    const slider = document.getElementById('timeSlider');
    const estTimeEl = document.getElementById('estTime');
    const estDateEl = document.getElementById('estDate');
    const istTimeEl = document.getElementById('istTime');
    const istDateEl = document.getElementById('istDate');
    const estOffsetEl = document.getElementById('estOffset');
    const resetBtn = document.getElementById('resetBtn');

    // Automatically determine if Eastern Time is currently in Daylight Saving (EDT) or Standard (EST)
    function getEstOffsetMinutes() {
        const d = new Date();
        const nyString = d.toLocaleString("en-US", {timeZone: "America/New_York", timeZoneName: "short"});
        const isEDT = nyString.includes("EDT");
        
        if (isEDT) {
            estOffsetEl.innerText = "Eastern Daylight Time (UTC-4)";
            return -240; // -4 hours in minutes
        } else {
            estOffsetEl.innerText = "Eastern Standard Time (UTC-5)";
            return -300; // -5 hours in minutes
        }
    }

    const estOffsetMinutes = getEstOffsetMinutes();
    const istOffsetMinutes = 330; // +5:30 in minutes (5 * 60 + 30)

    // Calculate current EST time to initialize slider
    function setSliderToCurrentTime() {
        const localDate = new Date();
        const utcMinutes = localDate.getUTCHours() * 60 + localDate.getUTCMinutes();
        let estMinutesToday = (utcMinutes + estOffsetMinutes + 1440) % 1440;
        slider.value = estMinutesToday;
        updateTimes(estMinutesToday);
    }

    function formatTime(dateObj) {
        let hours = dateObj.getHours();
        let mins = dateObj.getMinutes();
        let ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // convert 0 to 12
        mins = mins < 10 ? '0' + mins : mins;
        
        return `${hours}:${mins} ${ampm}`;
    }

    function formatDate(dateObj) {
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        return dateObj.toLocaleDateString('en-US', options);
    }

    function updateTimes(estMinutes) {
        const now = new Date();
        
        // 1. Establish the current absolute target date for Eastern Time
        // This converts the local device timestamp directly into an equivalent New York target date
        const estString = now.toLocaleString("en-US", {timeZone: "America/New_York"});
        const estCurrentTargetDate = new Date(estString);
        
        // 2. Set the hours and minutes of that target date to match our interactive slider value
        estCurrentTargetDate.setHours(Math.floor(estMinutes / 60), Math.floor(estMinutes % 60), 0, 0);

        // 3. Format and output the exact calculated Eastern Date text card
        estTimeEl.innerText = formatTime(estCurrentTargetDate);
        estDateEl.innerHTML = `${formatDate(estCurrentTargetDate)} <span class="day-offset">Selected Base Day</span>`;

        // 4. Track India Standard Time offset explicitly relative to the Eastern slider target time
        const totalDiffMinutes = istOffsetMinutes - estOffsetMinutes;
        const istCalculatedDate = new Date(estCurrentTargetDate.getTime() + totalDiffMinutes * 60 * 1000);

        // 5. Format and output the exact calculated India text card
        istTimeEl.innerText = formatTime(istCalculatedDate);

        // Calculate and clearly display if India is physically on a ahead/behind calendar day
        let dateLabel = "Same Day";
        if (istCalculatedDate.getDate() !== estCurrentTargetDate.getDate()) {
            // Simple absolute check to see if the timestamp pushed forward past midnight into tomorrow
            dateLabel = istCalculatedDate.getTime() > estCurrentTargetDate.getTime() ? "Next Day (+1)" : "Previous Day (-1)";
        }
        
        istDateEl.innerHTML = `${formatDate(istCalculatedDate)} <span class="day-offset">${dateLabel}</span>`;
    }

    // Event listeners
    slider.addEventListener('input', (e) => {
        updateTimes(parseInt(e.target.value));
    });

    resetBtn.addEventListener('click', setSliderToCurrentTime);

    // Initial load
    setSliderToCurrentTime();
</script>

</body>
</html>
