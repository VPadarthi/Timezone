<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Time Zone Converter (EST & IST)</title>
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --primary: #38bdf8; 
            --accent: #fbbf24; 
            --slider-track: #334155; 
            --box-bg: #111827; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .time-box {
            background: var(--box-bg);
            border-left: 5px solid var(--primary);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .time-box.ist {
            border-left-color: var(--accent);
        }

        .zone-label {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        .zone-sub {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            font-weight: normal;
            margin-top: 2px;
        }

        .time-display {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
        }

        .date-display {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            text-align: right;
            margin-top: 4px;
        }

        .day-offset {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            font-weight: normal;
        }

        .slider-container {
            margin: 35px 0 20px 0;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: var(--slider-track);
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #7dd3fc;
        }

        .ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 11px;
        }

        .btn-reset {
            display: block;
            margin: 20px auto 0 auto;
            background: #334155;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #f1f5f9;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-reset:hover {
            background: #475569;
            border-color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>EST / IST Time Finder</h1>
    <p class="subtitle">Drag the scroll bar to view corresponding matching times and dates</p>

    <!-- EST Card -->
    <div class="time-box">
        <div>
            <span class="zone-label" id="estTitle">EST</span>
            <span class="zone-sub" id="estOffset">Eastern Standard Time</span>
        </div>
        <div>
            <div class="time-display" id="estTime">- - : - -</div>
            <div class="date-display" id="estDate">- - - -</div>
        </div>
    </div>

    <!-- IST Card -->
    <div class="time-box ist">
        <div>
            <span class="zone-label">IST</span>
            <span class="zone-sub">India Standard Time (UTC+5:30)</span>
        </div>
        <div>
            <div class="time-display" id="istTime">- - : - -</div>
            <div class="date-display" id="istDate">- - - -</div>
        </div>
    </div>

    <!-- Interactive Scroll Bar -->
    <div class="slider-container">
        <input type="range" id="timeSlider" min="0" max="1439" value="720">
        <div class="ticks">
            <span>12 AM</span>
            <span>6 AM</span>
            <span>12 PM</span>
            <span>6 PM</span>
            <span>11 PM</span>
        </div>
    </div>

    <button class="btn-reset" id="resetBtn">Reset to Current Time</button>
</div>

<script>
    const slider = document.getElementById('timeSlider');
    const estTimeEl = document.getElementById('estTime');
    const estDateEl = document.getElementById('estDate');
    const istTimeEl = document.getElementById('istTime');
    const istDateEl = document.getElementById('istDate');
    const estOffsetEl = document.getElementById('estOffset');
    const estTitleEl = document.getElementById('estTitle');
    const resetBtn = document.getElementById('resetBtn');

    // Safe, universal check for Eastern Daylight Saving status
    function checkDST() {
        const d = new Date();
        const nyString = d.toLocaleString("en-US", {timeZone: "America/New_York", timeZoneName: "short"});
        const isEDT = nyString.includes("EDT");
        
        if (isEDT) {
            estTitleEl.innerText = "EDT";
            estOffsetEl.innerText = "Eastern Daylight Time (UTC-4)";
            return -240; // -4 hours in minutes
        } else {
            estTitleEl.innerText = "EST";
            estOffsetEl.innerText = "Eastern Standard Time (UTC-5)";
            return -300; // -5 hours in minutes
        }
    }

    const estOffsetMinutes = checkDST();
    const istOffsetMinutes = 330; // Fixed India offset (+5:30)

    function setSliderToCurrentTime() {
        const now = new Date();
        // Convert to absolute UTC minutes from midnight
        const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
        // Convert UTC to local Eastern time minutes
        let estMinutesToday = (utcMinutes + estOffsetMinutes + 1440) % 1440;
        
        slider.value = estMinutesToday;
        updateTimes(estMinutesToday);
    }

    function formatTime(hours, minutes) {
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    function formatDate(dateObj) {
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        return dateObj.toLocaleDateString('en-US', options);
    }

    function updateTimes(estMinutes) {
        // Find current base day in New York timezone safely
        const now = new Date();
        const nyString = now.toLocaleString("en-US", {timeZone: "America/New_York"});
        const estBaseDate = new Date(nyString);
        
        // Update New York target date using explicit slider parameters
        estBaseDate.setHours(Math.floor(estMinutes / 60), Math.floor(estMinutes % 60), 0, 0);

        // Display New York output fields
        estTimeEl.innerText = formatTime(estBaseDate.getHours(), estBaseDate.getMinutes());
        estDateEl.innerHTML = `${formatDate(estBaseDate)} <span class="day-offset">Selected Base Day</span>`;

        // Calculate explicit offset difference between zones
        const totalDiffMinutes = istOffsetMinutes - estOffsetMinutes;
        const istCalculatedDate = new Date(estBaseDate.getTime() + totalDiffMinutes * 60 * 1000);

        // Display India output fields
        istTimeEl.innerText = formatTime(istCalculatedDate.getHours(), istCalculatedDate.getMinutes());

        // Determine if India has crossed into a different calendar date
        let dateLabel = "Same Day";
        if (istCalculatedDate.getDate() !== estBaseDate.getDate()) {
            dateLabel = istCalculatedDate.getTime() > estBaseDate.getTime() ? "Next Day (+1)" : "Previous Day (-1)";
        }
        
        istDateEl.innerHTML = `${formatDate(istCalculatedDate)} <span class="day-offset">${dateLabel}</span>`;
    }

    // Event listeners
    slider.addEventListener('input', (e) => {
        updateTimes(parseInt(e.target.value));
    });

    resetBtn.addEventListener('click', setSliderToCurrentTime);

    // Run app on launch
    setSliderToCurrentTime();
</script>

</body>
</html>
