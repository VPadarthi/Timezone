<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Time Zone Converter (EST & IST)</title>
    <style>
        :root {
            --bg-color: #0b0f19; 
            --card-bg: #151f32; 
            --text-main: #f8fafc; 
            --text-muted: #64748b; 
            --primary: #38bdf8; 
            --accent: #fbbf24; 
            --slider-track: #1e293b; 
            --box-bg: #0f172a; 
            
            /* Day Theme Background & Accents */
            --day-bg: linear-gradient(180deg, #bae6fd 0%, #ffedd5 100%);
            --day-text: #0f172a;

            /* Night Theme Background */
            --night-bg: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f19 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
            overflow: hidden; 
            border: 1px solid #1e293b;
        }

        /* Twin Master Dynamic Screens */
        .display-split {
            display: flex;
            height: 220px;
            width: 100%;
            position: relative;
        }

        .zone-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .zone-card:first-child {
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .meta-left h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .meta-left span {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.7;
        }

        .card-body {
            text-align: center;
            margin-bottom: 10px;
            z-index: 5;
        }

        .large-time {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 12px;
            font-variant-numeric: tabular-nums;
        }

        .large-date {
            font-size: 14px;
            font-weight: 600;
            opacity: 0.8;
        }

        /* Star Field for Night Mode */
        .star-field {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, #fff, transparent),
                radial-gradient(1.5px 1.5px at 60px 120px, #fff, transparent),
                radial-gradient(1px 1px at 120px 40px, #fff, transparent),
                radial-gradient(2px 2px at 190px 150px, #fff, transparent),
                radial-gradient(1.5px 1.5px at 280px 70px, #fff, transparent),
                radial-gradient(1px 1px at 150px 180px, #fff, transparent);
            background-size: 100% 100%;
        }

        .celestial-graphic {
            position: absolute;
            font-size: 70px;
            top: 20px;
            right: 25px;
            z-index: 2;
            user-select: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(100px);
            opacity: 0;
        }

        /* Active Themes */
        .zone-card.is-day-theme {
            background: var(--day-bg);
            color: var(--day-text);
        }
        .zone-card.is-day-theme .large-time { color: var(--day-text); }
        .zone-card.is-day-theme .celestial-graphic.sun {
            transform: translateY(0) rotate(0deg);
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.6));
        }

        .zone-card.is-night-theme {
            background: var(--night-bg);
            color: var(--text-main);
        }
        .zone-card.is-night-theme .large-time { color: #ffffff; }
        .zone-card.is-night-theme .star-field {
            opacity: 0.4;
        }
        .zone-card.is-night-theme .celestial-graphic.moon {
            transform: translateY(0) scale(1);
            opacity: 1;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.15));
        }

        /* Bottom Controls Container */
        .app-controls {
            padding: 30px;
            background-color: #0f172a;
        }

        .slider-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #1e293b;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
            margin-top: 10px;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .info-panel {
            background-color: #151f32;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
        }

        .info-title {
            color: #64748b;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 500;
            color: #e2e8f0;
        }

        .btn-sync {
            display: block;
            margin: 25px auto 0 auto;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            color: #f1f5f9;
            font-weight: 600;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-sync:hover {
            background: #334155;
            border-color: #475569;
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .display-split {
                flex-direction: column;
                height: auto;
            }
            .zone-card:first-child {
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .zone-card {
                height: 160px;
            }
            .celestial-graphic {
                font-size: 55px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="display-split">
        <!-- EST/EDT Viewport -->
        <div class="zone-card" id="estCard">
            <div class="star-field"></div>
            <div class="celestial-graphic sun">☀️</div>
            <div class="celestial-graphic moon">🌙</div>
            <div class="card-meta">
                <div class="meta-left">
                    <h3 id="estLabelTitle">EST</h3>
                    <span id="estLabelSub">UTC-5</span>
                </div>
            </div>
            <div class="card-body">
                <div class="large-time" id="estTimeDisplay">- - : - -</div>
                <div class="large-date" id="estDateDisplay">---, --- --</div>
            </div>
        </div>

        <!-- IST Viewport -->
        <div class="zone-card" id="istCard">
            <div class="star-field"></div>
            <div class="celestial-graphic sun">☀️</div>
            <div class="celestial-graphic moon">🌙</div>
            <div class="card-meta">
                <div class="meta-left">
                    <h3>IST</h3>
                    <span>UTC+5:30</span>
                </div>
            </div>
            <div class="card-body">
                <div class="large-time" id="istTimeDisplay">- - : - -</div>
                <div class="large-date" id="istDateDisplay">---, --- --</div>
            </div>
        </div>
    </div>

    <div class="app-controls">
        <div class="slider-wrapper">
            <input type="range" id="timeSlider" min="0" max="1439" value="720">
            <div class="ticks">
                <span>MIDNIGHT</span>
